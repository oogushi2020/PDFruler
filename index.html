<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Device PDF Measure Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --sidebar-width: 280px; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f3f4f6; }
        
        /* サイドバー */
        #sidebar {
            width: var(--sidebar-width); background: white; border-right: 1px solid #e5e7eb;
            padding: 15px; display: flex; flex-direction: column; gap: 12px; z-index: 100;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05); overflow-y: auto;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 11px; font-weight: bold; color: #4b5563; }
        select, input, button { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
        input[type="number"] { width: 80px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { opacity: 0.9; }

        .tab-container { display: flex; flex-wrap: wrap; gap: 2px; border-bottom: 2px solid #d1d5db; }
        .tab-button {
            flex: 1; padding: 10px 2px; background: #f3f4f6; border: none; cursor: pointer;
            font-weight: bold; color: #4b5563; font-size: 11px; border-bottom: 3px solid transparent;
        }
        .tab-button.active { background: white; color: var(--primary); border-bottom-color: var(--primary); }

        #pen-settings { display: none; padding: 10px; background: #f0f7ff; border-radius: 8px; border: 1px solid #c3dafe; }
        .color-picker { display: flex; gap: 10px; margin-bottom: 8px; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        .color-btn.active { outline: 2px solid var(--primary); }

        /* ビューワーエリア */
        #viewer-container {
            flex-grow: 1; position: relative; overflow: auto; 
            background: #525659; display: block;
            -webkit-overflow-scrolling: touch;
        }
        #canvas-wrapper { position: relative; transform-origin: 0 0; }
        #pdf-canvas { position: absolute; top: 0; left: 0; }
        #measure-canvas { position: absolute; top: 0; left: 0; touch-action: none; cursor: crosshair; }

        .info-panel { padding: 10px; background: #f9fafb; border-radius: 8px; font-size: 13px; }
        .result-value { font-size: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin:0; font-size: 1.1rem;">📏 図面計測Pro</h2>
    <input type="file" id="file-input" accept="application/pdf">

    <div class="control-group">
        <label>用紙サイズ</label>
        <select id="paper-size">
            <option value="A1" data-w="841">A1 (841 x 594 mm)</option>
            <option value="A2" data-w="594">A2 (594 x 420 mm)</option>
            <option value="A3" data-w="420" selected>A3 (420 x 297 mm)</option>
            <option value="A4" data-w="297">A4 (297 x 210 mm)</option>
        </select>
    </div>

    <div class="control-group">
        <label>尺度設定 (1 : 〇〇)</label>
        <div style="display:flex; align-items:center; gap:8px;">
            <span>1 : </span>
            <input type="number" id="scale-input" value="100" min="1" step="1">
            <span style="font-size:10px; color:#666;">自由入力可</span>
        </div>
    </div>

    <div class="tab-container">
        <button class="tab-button active" data-mode="line" onclick="switchMode('line')">線測定</button>
        <button class="tab-button" data-mode="area" onclick="switchMode('area')">面積</button>
        <button class="tab-button" data-mode="pen" onclick="switchMode('pen')">ペン</button>
        <button class="tab-button" data-mode="eraser" onclick="switchMode('eraser')">消し</button>
    </div>

    <div id="pen-settings">
        <div class="color-picker">
            <div class="color-btn active" style="background: #000;" onclick="setPenStyle('#000', this)"></div>
            <div class="color-btn" style="background: #f00;" onclick="setPenStyle('#f00', this)"></div>
            <div class="color-btn" style="background: #00f;" onclick="setPenStyle('#00f', this)"></div>
        </div>
        <select id="pen-width" onchange="currentPenWidth = parseInt(this.value)" style="width:100%;">
            <option value="2">細</option>
            <option value="5" selected>中</option>
            <option value="10">太</option>
        </select>
    </div>

    <div class="info-panel">
        <label>測定値</label>
        <div class="result-value" id="measure-result">---</div>
    </div>
    
    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
        <button onclick="resetAll()" style="background: #9ca3af;">クリア</button>
        <button onclick="exportToPDF()" style="background: #16a34a;">📥 デバイスに保存(PDF)</button>
    </div>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="measure-canvas"></canvas>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null, currentScale = 1.2, prevW = null;
    let measureMode = 'line';
    let measurements = [], areaPolygons = [], freehandPaths = [];

    // 共通状態
    let isActive = false, startPoint = null, currentPoint = null, currentPath = null;
    let editingIndex = -1, editingEndPoint = null, editingType = null;
    let currentPenColor = '#000', currentPenWidth = 5;

    // iPadナビゲーション用
    let isNavigating = false;
    let initialPinchDist = 0, initialScale = 1.0;
    let lastTouchMidX = 0, lastTouchMidY = 0;

    const viewer = document.getElementById('viewer-container');
    const wrapper = document.getElementById('canvas-wrapper');
    const pdfCanvas = document.getElementById('pdf-canvas');
    const measureCanvas = document.getElementById('measure-canvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const measureCtx = measureCanvas.getContext('2d');

    function switchMode(mode) {
        measureMode = mode;
        document.querySelectorAll('.tab-button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        document.getElementById('pen-settings').style.display = (mode === 'pen') ? 'block' : 'none';
        drawAll();
    }

    function setPenStyle(color, el) {
        currentPenColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // PDF読み込み
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            renderPage();
        };
        reader.readAsArrayBuffer(file);
    });

    async function renderPage() {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(1);
        const viewport = page.getViewport({ scale: currentScale });

        if (prevW !== null) {
            const ratio = viewport.width / prevW;
            const sc = (p) => { p.x *= ratio; p.y *= ratio; };
            measurements.forEach(m => { sc(m.p1); sc(m.p2); });
            areaPolygons.forEach(a => { sc(a.p1); sc(a.p2); });
            freehandPaths.forEach(path => path.points.forEach(sc));
        }

        prevW = viewport.width;
        pdfCanvas.width = measureCanvas.width = viewport.width;
        pdfCanvas.height = measureCanvas.height = viewport.height;
        wrapper.style.width = viewport.width + "px";
        wrapper.style.height = viewport.height + "px";

        await page.render({ canvasContext: pdfCtx, viewport: viewport }).promise;
        drawAll();
    }

    function getPos(e) {
        const rect = measureCanvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    // --- イベント制御 (iPad & PC 統合) ---

    function onDown(e) {
        // iPadマルチタッチ判定
        if (e.touches && e.touches.length === 2) {
            isNavigating = true;
            isActive = false;
            initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            initialScale = currentScale;
            lastTouchMidX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
            lastTouchMidY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
            return;
        }

        isNavigating = false;
        const p = getPos(e);
        
        // 既存ポイントの編集チェック (PC/iPad共通)
        editingIndex = -1;
        const check = (list, type) => {
            list.forEach((it, i) => {
                const threshold = e.touches ? 25 : 12; // タッチは判定広め
                if (Math.hypot(p.x-it.p1.x, p.y-it.p1.y) < threshold) { editingIndex = i; editingEndPoint = 'p1'; editingType = type; }
                else if (Math.hypot(p.x-it.p2.x, p.y-it.p2.y) < threshold) { editingIndex = i; editingEndPoint = 'p2'; editingType = type; }
            });
        };
        check(measurements, 'line');
        if (editingIndex === -1) check(areaPolygons, 'area');

        isActive = true;
        if (editingIndex === -1) {
            if (measureMode === 'pen') currentPath = { points: [p], color: currentPenColor, width: currentPenWidth };
            else if (measureMode === 'eraser') erase(p);
            else startPoint = p;
        }
    }

    function onMove(e) {
        if (isNavigating && e.touches && e.touches.length === 2) {
            const midX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
            const midY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
            viewer.scrollLeft -= (midX - lastTouchMidX);
            viewer.scrollTop -= (midY - lastTouchMidY);
            lastTouchMidX = midX; lastTouchMidY = midY;
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            wrapper.style.transform = `scale(${dist / initialPinchDist})`;
            return;
        }

        if (!isActive) return;
        const p = getPos(e);
        currentPoint = p;

        if (editingIndex !== -1) {
            const target = (editingType === 'line') ? measurements[editingIndex] : areaPolygons[editingIndex];
            target[editingEndPoint] = p;
        } else if (measureMode === 'pen') {
            currentPath.points.push(p);
        } else if (measureMode === 'eraser') {
            erase(p);
        }
        drawAll();
    }

    function onUp() {
        if (isNavigating) {
            const rect = wrapper.getBoundingClientRect();
            currentScale = (rect.width / (pdfCanvas.width / currentScale));
            wrapper.style.transform = "scale(1)";
            renderPage();
            isNavigating = false;
        }
        if (isActive) {
            if (editingIndex === -1) {
                if (measureMode === 'pen' && currentPath) freehandPaths.push(currentPath);
                else if (measureMode === 'line' && startPoint && currentPoint) measurements.push({ p1: startPoint, p2: currentPoint });
                else if (measureMode === 'area' && startPoint && currentPoint) areaPolygons.push({ p1: startPoint, p2: currentPoint });
            }
            isActive = false;
            startPoint = currentPoint = currentPath = null;
            updateList(); drawAll();
        }
    }

    // イベント登録
    measureCanvas.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    measureCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(e); }, {passive:false});
    measureCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive:false});
    measureCanvas.addEventListener('touchend', onUp);

    // --- 計算・描画 ---

    function getCustomScale() {
        return parseFloat(document.getElementById('scale-input').value) || 100;
    }

    function calcDist(p1, p2) {
        const px = Math.hypot(p1.x-p2.x, p1.y-p2.y);
        const pw = parseFloat(document.getElementById('paper-size').selectedOptions[0].dataset.w);
        const sc = getCustomScale();
        return Math.round((px / currentScale) * (pw / (pdfCanvas.width / currentScale)) * sc);
    }

    function calcArea(rect) {
        const w = Math.abs(rect.p1.x-rect.p2.x), h = Math.abs(rect.p1.y-rect.p2.y);
        const pw = parseFloat(document.getElementById('paper-size').selectedOptions[0].dataset.w);
        const sc = getCustomScale();
        const mpp = pw / (pdfCanvas.width / currentScale);
        return (((w/currentScale)*mpp*sc * (h/currentScale)*mpp*sc) / 1000000).toFixed(3);
    }

    function drawAll() {
        measureCtx.clearRect(0, 0, measureCanvas.width, measureCanvas.height);
        [...freehandPaths, currentPath].forEach(path => {
            if (!path || path.points.length < 2) return;
            measureCtx.beginPath(); measureCtx.strokeStyle = path.color; measureCtx.lineWidth = path.width;
            measureCtx.lineCap = 'round'; measureCtx.lineJoin = 'round';
            measureCtx.moveTo(path.points[0].x, path.points[0].y);
            path.points.forEach(pt => measureCtx.lineTo(pt.x, pt.y)); measureCtx.stroke();
        });
        measurements.forEach((m, i) => drawLine(m.p1, m.p2, (editingIndex===i && editingType==='line') ? '#ff7f00':'red'));
        if (measureMode === 'line' && isActive && startPoint && currentPoint && editingIndex===-1) drawLine(startPoint, currentPoint, '#ff7f00', true);
        areaPolygons.forEach((a, i) => drawArea(a.p1, a.p2, (editingIndex===i && editingType==='area') ? 'rgba(255,165,0,0.3)':'rgba(255,0,0,0.15)'));
        if (measureMode === 'area' && isActive && startPoint && currentPoint && editingIndex===-1) drawArea(startPoint, currentPoint, 'rgba(255,165,0,0.2)');
    }

    function drawLine(p1, p2, color, dash=false) {
        measureCtx.beginPath(); measureCtx.strokeStyle = color; measureCtx.lineWidth = 2;
        if (dash) measureCtx.setLineDash([5,5]);
        measureCtx.moveTo(p1.x, p1.y); measureCtx.lineTo(p2.x, p2.y); measureCtx.stroke();
        measureCtx.setLineDash([]);
        measureCtx.fillStyle = color;
        [p1, p2].forEach(p => { measureCtx.beginPath(); measureCtx.arc(p.x, p.y, 6, 0, Math.PI*2); measureCtx.fill(); });
        measureCtx.fillStyle = 'blue'; measureCtx.font = 'bold 14px sans-serif';
        measureCtx.fillText(`${calcDist(p1, p2)}mm`, (p1.x+p2.x)/2, (p1.y+p2.y)/2);
    }

    function drawArea(p1, p2, fill) {
        const x = Math.min(p1.x, p2.x), y = Math.min(p1.y, p2.y);
        const w = Math.abs(p2.x-p1.x), h = Math.abs(p2.y-p1.y);
        measureCtx.fillStyle = fill; measureCtx.fillRect(x, y, w, h);
        measureCtx.strokeStyle = 'red'; measureCtx.strokeRect(x, y, w, h);
        measureCtx.fillStyle = 'blue'; measureCtx.font = 'bold 16px sans-serif';
        measureCtx.textAlign = "center"; measureCtx.fillText(`${calcArea(a={p1,p2})}m²`, x+w/2, y+h/2); measureCtx.textAlign = "left";
    }

    function erase(p) {
        freehandPaths = freehandPaths.filter(path => !path.points.some(pt => Math.hypot(pt.x-p.x, pt.y-p.y) < 20));
    }

    function updateList() {
        const res = document.getElementById('measure-result');
        if (measurements.length > 0) res.innerText = `${calcDist(measurements[measurements.length-1].p1, measurements[measurements.length-1].p2)} mm`;
        if (areaPolygons.length > 0) res.innerText = `${calcArea(areaPolygons[areaPolygons.length-1])} m²`;
    }

    function resetAll() { measurements = []; areaPolygons = []; freehandPaths = []; drawAll(); updateList(); }

    async function exportToPDF() {
        if (!pdfDoc) return;
        const name = prompt("保存名", "survey_result");
        if (!name) return;
        const page = await pdfDoc.getPage(1);
        const v = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = v.width; canvas.height = v.height;
        await page.render({ canvasContext: ctx, viewport: v }).promise;
        const s = 2.0 / currentScale;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        freehandPaths.forEach(p => {
            ctx.beginPath(); ctx.strokeStyle = p.color; ctx.lineWidth = p.width * s;
            ctx.moveTo(p.points[0].x*s, p.points[0].y*s);
            p.points.forEach(pt => ctx.lineTo(pt.x*s, pt.y*s)); ctx.stroke();
        });
        ctx.font = `bold ${14*s}px sans-serif`;
        measurements.forEach(m => {
            ctx.strokeStyle = 'red'; ctx.lineWidth = 2*s;
            ctx.beginPath(); ctx.moveTo(m.p1.x*s, m.p1.y*s); ctx.lineTo(m.p2.x*s, m.p2.y*s); ctx.stroke();
            ctx.fillStyle = 'blue'; ctx.fillText(`${calcDist(m.p1, m.p2)}mm`, ((m.p1.x+m.p2.x)/2)*s, ((m.p1.y+m.p2.y)/2)*s);
        });
        areaPolygons.forEach(a => {
            const x = Math.min(a.p1.x, a.p2.x)*s, y = Math.min(a.p1.y, a.p2.y)*s;
            const w = Math.abs(a.p2.x-a.p1.x)*s, h = Math.abs(a.p2.y-a.p1.y)*s;
            ctx.fillStyle = 'rgba(255,0,0,0.1)'; ctx.fillRect(x,y,w,h);
            ctx.strokeStyle = 'red'; ctx.strokeRect(x,y,w,h);
            ctx.fillStyle = 'blue'; ctx.textAlign="center"; ctx.fillText(`${calcArea(a)}m²`, x+w/2, y+h/2);
        });
        const { jsPDF } = window.jspdf;
        const out = new jsPDF(v.width > v.height ? 'l' : 'p', 'px', [v.width, v.height]);
        out.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, v.width, v.height);
        out.save(`${name}.pdf`);
    }
</script>
</body>
</html>

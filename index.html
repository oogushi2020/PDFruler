<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Measurement & Drawing Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --sidebar-width: 300px; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f3f4f6; }
        
        #sidebar {
            width: var(--sidebar-width); background: white; border-right: 1px solid #e5e7eb;
            padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05); overflow-y: auto;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #4b5563; }
        select, input, button { padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { opacity: 0.9; }

        .tab-container { display: flex; flex-wrap: wrap; gap: 2px; border-bottom: 2px solid #d1d5db; }
        .tab-button {
            flex: 1; padding: 8px 2px; background: #f3f4f6; border: none; cursor: pointer;
            font-weight: bold; color: #4b5563; font-size: 11px; border-bottom: 3px solid transparent;
        }
        .tab-button.active { background: white; color: var(--primary); border-bottom-color: var(--primary); }

        #pen-settings { display: none; padding: 10px; background: #f0f7ff; border-radius: 5px; border: 1px solid #c3dafe; }
        .color-picker { display: flex; gap: 10px; margin: 5px 0; }
        .color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; cursor: pointer; box-shadow: 0 0 3px rgba(0,0,0,0.2); }
        .color-btn.active { outline: 2px solid var(--primary); }

        #viewer-container { flex-grow: 1; position: relative; overflow: auto; display: flex; justify-content: center; background: #525659; }
        #canvas-wrapper { position: relative; margin: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        #pdf-canvas { position: absolute; top: 0; left: 0; }
        #measure-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }

        .info-panel { padding: 10px; background: #f9fafb; border-radius: 8px; font-size: 12px; }
        .result-value { font-size: 18px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin:0; font-size: 1.1rem;">📏 PDF図面ツール</h2>
    
    <div class="control-group">
        <label>① PDF読み込み</label>
        <input type="file" id="file-input" accept="application/pdf">
    </div>

    <div class="control-group">
        <label>② 用紙 / 縮尺</label>
        <select id="paper-size">
            <option value="A4" data-w="297" data-h="210">A4 (297x210mm)</option>
            <option value="A3" data-w="420" data-h="297" selected>A3 (420x297mm)</option>
            <option value="A2" data-w="594" data-h="420">A2 (594x420mm)</option>
        </select>
        <select id="scale-factor">
            <option value="50">1:50</option>
            <option value="100" selected>1:100</option>
            <option value="200">1:200</option>
            <option value="300">1:300</option>
        </select>
    </div>

    <div class="control-group">
        <label>ズーム: <span id="zoom-val">150%</span></label>
        <input type="range" id="zoom-range" min="0.5" max="3" step="0.1" value="1.5">
    </div>

    <div class="tab-container">
        <button class="tab-button active" data-mode="line" onclick="switchMode('line')">線測定</button>
        <button class="tab-button" data-mode="area" onclick="switchMode('area')">面積測定</button>
        <button class="tab-button" data-mode="pen" onclick="switchMode('pen')">ペン</button>
        <button class="tab-button" data-mode="eraser" onclick="switchMode('eraser')">消しゴム</button>
    </div>

    <div id="pen-settings">
        <label>ペン色:</label>
        <div class="color-picker">
            <div class="color-btn active" style="background: #000000;" onclick="setPenStyle('#000000', this)"></div>
            <div class="color-btn" style="background: #ff0000;" onclick="setPenStyle('#ff0000', this)"></div>
            <div class="color-btn" style="background: #0000ff;" onclick="setPenStyle('#0000ff', this)"></div>
        </div>
        <label>太さ:</label>
        <select id="pen-width" onchange="currentPenWidth = parseInt(this.value)">
            <option value="2">細</option>
            <option value="5" selected>中</option>
            <option value="10">太</option>
        </select>
    </div>

    <div class="info-panel">
        <div id="result-label">最新の測定:</div>
        <div class="result-value" id="measure-result">---</div>
    </div>

    <div id="measurement-list" class="info-panel" style="max-height: 150px; overflow-y: auto;">
        <div style="font-weight: bold; margin-bottom: 5px; color: var(--primary);">履歴:</div>
        <div id="measurement-items"></div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: auto;">
        <button onclick="resetAll()" style="background: #9ca3af;">計測クリア</button>
        <button onclick="exportToPDF()" style="background: #16a34a;">📥 名前をつけてPDF保存</button>
    </div>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="measure-canvas"></canvas>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1, currentScale = 1.5;
    let measureMode = 'line', prevW = null, prevH = null;

    // データ
    let measurements = [];   // 線
    let areaPolygons = [];   // 面積
    let freehandPaths = [];  // ペン

    // 編集・描画状態
    let isDrawing = false, startPoint = null, currentPoint = null;
    let editingIndex = -1, editingEndPoint = null, editingType = null; 
    let currentPath = null;
    let currentPenColor = '#000000', currentPenWidth = 5;

    const pdfCanvas = document.getElementById('pdf-canvas');
    const measureCanvas = document.getElementById('measure-canvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const measureCtx = measureCanvas.getContext('2d');

    function switchMode(mode) {
        measureMode = mode;
        document.querySelectorAll('.tab-button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        document.getElementById('pen-settings').style.display = (mode === 'pen') ? 'block' : 'none';
        isDrawing = false;
        drawAll();
    }

    function setPenStyle(color, el) {
        currentPenColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    // PDF読み込み
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            renderPage();
        };
        reader.readAsArrayBuffer(file);
    });

    // ズーム
    document.getElementById('zoom-range').addEventListener('input', (e) => {
        currentScale = parseFloat(e.target.value);
        document.getElementById('zoom-val').innerText = `${Math.round(currentScale*100)}%`;
        if (pdfDoc) renderPage();
    });

    async function renderPage() {
        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: currentScale });

        if (prevW !== null) {
            const sx = viewport.width / prevW, sy = viewport.height / prevH;
            measurements.forEach(m => { m.p1.x*=sx; m.p1.y*=sy; m.p2.x*=sx; m.p2.y*=sy; });
            areaPolygons.forEach(a => { a.p1.x*=sx; a.p1.y*=sy; a.p2.x*=sx; a.p2.y*=sy; });
            freehandPaths.forEach(path => path.points.forEach(p => { p.x*=sx; p.y*=sy; }));
        }

        prevW = viewport.width; prevH = viewport.height;
        pdfCanvas.width = measureCanvas.width = viewport.width;
        pdfCanvas.height = measureCanvas.height = viewport.height;

        await page.render({ canvasContext: pdfCtx, viewport: viewport }).promise;
        drawAll();
        updateList();
    }

    function getPos(e) {
        const rect = measureCanvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    }

    function isNear(p1, p2, dist = 12) {
        return Math.hypot(p1.x - p2.x, p1.y - p2.y) < dist;
    }

    // 操作開始
    function handleDown(e) {
        if (e.touches && e.touches.length > 1) return;
        const p = getPos(e);
        
        // 1. 既存ポイントのヒットテスト（編集モード）
        editingIndex = -1;
        editingType = null;

        // 線測定の端点チェック
        for (let i = 0; i < measurements.length; i++) {
            if (isNear(p, measurements[i].p1)) { editingIndex = i; editingEndPoint = 'p1'; editingType = 'line'; break; }
            if (isNear(p, measurements[i].p2)) { editingIndex = i; editingEndPoint = 'p2'; editingType = 'line'; break; }
        }

        // 面積測定の端点チェック
        if (editingIndex === -1) {
            for (let i = 0; i < areaPolygons.length; i++) {
                if (isNear(p, areaPolygons[i].p1)) { editingIndex = i; editingEndPoint = 'p1'; editingType = 'area'; break; }
                if (isNear(p, areaPolygons[i].p2)) { editingIndex = i; editingEndPoint = 'p2'; editingType = 'area'; break; }
            }
        }

        if (editingIndex !== -1) {
            isDrawing = true;
            return;
        }

        // 2. 新規作成モード
        isDrawing = true;
        if (measureMode === 'pen') {
            currentPath = { points: [p], color: currentPenColor, width: currentPenWidth };
        } else if (measureMode === 'eraser') {
            erase(p);
        } else {
            startPoint = p;
        }
    }

    function handleMove(e) {
        if (!isDrawing) return;
        const p = getPos(e);
        currentPoint = p;

        if (editingIndex !== -1) {
            // 編集中の移動
            const target = (editingType === 'line') ? measurements[editingIndex] : areaPolygons[editingIndex];
            target[editingEndPoint] = p;
        } else if (measureMode === 'pen') {
            currentPath.points.push(p);
        } else if (measureMode === 'eraser') {
            erase(p);
        }
        drawAll();
    }

    function handleUp() {
        if (!isDrawing) return;
        
        if (editingIndex === -1) {
            if (measureMode === 'pen' && currentPath) {
                freehandPaths.push(currentPath);
            } else if (measureMode === 'line' && startPoint && currentPoint) {
                measurements.push({ p1: startPoint, p2: currentPoint });
            } else if (measureMode === 'area' && startPoint && currentPoint) {
                areaPolygons.push({ p1: startPoint, p2: currentPoint });
            }
        }

        isDrawing = false;
        startPoint = currentPoint = currentPath = null;
        editingIndex = -1;
        updateList();
        drawAll();
    }

    function erase(p) {
        const hit = 15;
        freehandPaths = freehandPaths.filter(path => !path.points.some(pt => isNear(pt, p, hit)));
    }

    measureCanvas.addEventListener('mousedown', handleDown);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    measureCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(e); }, {passive:false});
    measureCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive:false});
    measureCanvas.addEventListener('touchend', handleUp);

    function drawAll() {
        measureCtx.clearRect(0, 0, measureCanvas.width, measureCanvas.height);
        
        // ペン
        [...freehandPaths, currentPath].forEach(path => {
            if (!path || path.points.length < 2) return;
            measureCtx.beginPath();
            measureCtx.strokeStyle = path.color;
            measureCtx.lineWidth = path.width;
            measureCtx.lineCap = 'round';
            measureCtx.lineJoin = 'round';
            measureCtx.moveTo(path.points[0].x, path.points[0].y);
            path.points.forEach(pt => measureCtx.lineTo(pt.x, pt.y));
            measureCtx.stroke();
        });

        // 線測定
        measurements.forEach((m, i) => drawLine(m.p1, m.p2, (editingIndex===i && editingType==='line') ? '#ff7f00':'red'));
        if (measureMode === 'line' && isDrawing && startPoint && currentPoint && editingIndex===-1) drawLine(startPoint, currentPoint, '#ff7f00', true);

        // 面積測定
        areaPolygons.forEach((a, i) => drawArea(a.p1, a.p2, (editingIndex===i && editingType==='area') ? 'rgba(255,165,0,0.3)':'rgba(255,0,0,0.15)'));
        if (measureMode === 'area' && isDrawing && startPoint && currentPoint && editingIndex===-1) drawArea(startPoint, currentPoint, 'rgba(255,165,0,0.2)');
    }

    function drawLine(p1, p2, color, dash=false) {
        measureCtx.beginPath();
        measureCtx.strokeStyle = color;
        measureCtx.lineWidth = 2;
        if (dash) measureCtx.setLineDash([5,5]);
        measureCtx.moveTo(p1.x, p1.y);
        measureCtx.lineTo(p2.x, p2.y);
        measureCtx.stroke();
        measureCtx.setLineDash([]);
        
        // 端点
        measureCtx.fillStyle = color;
        measureCtx.beginPath(); measureCtx.arc(p1.x, p1.y, 4, 0, Math.PI*2); measureCtx.fill();
        measureCtx.beginPath(); measureCtx.arc(p2.x, p2.y, 4, 0, Math.PI*2); measureCtx.fill();

        const d = calcDist(p1, p2);
        measureCtx.fillStyle = 'blue';
        measureCtx.font = 'bold 12px sans-serif';
        measureCtx.fillText(`${d}mm`, (p1.x+p2.x)/2, (p1.y+p2.y)/2);
    }

    function drawArea(p1, p2, fill) {
        const x = Math.min(p1.x, p2.x), y = Math.min(p1.y, p2.y);
        const w = Math.abs(p2.x-p1.x), h = Math.abs(p2.y-p1.y);
        measureCtx.fillStyle = fill;
        measureCtx.fillRect(x, y, w, h);
        measureCtx.strokeStyle = 'red';
        measureCtx.strokeRect(x, y, w, h);
        
        // 角
        measureCtx.fillStyle = 'red';
        [{x:p1.x,y:p1.y}, {x:p2.x,y:p2.y}].forEach(p => {
            measureCtx.beginPath(); measureCtx.arc(p.x, p.y, 4, 0, Math.PI*2); measureCtx.fill();
        });

        const a = calcArea({p1, p2});
        measureCtx.fillStyle = 'blue';
        measureCtx.font = 'bold 14px sans-serif';
        measureCtx.textAlign = "center";
        measureCtx.fillText(`${a}m²`, x+w/2, y+h/2);
        measureCtx.textAlign = "left";
    }

    function calcDist(p1, p2) {
        const px = Math.hypot(p1.x-p2.x, p1.y-p2.y);
        const pw = parseFloat(document.getElementById('paper-size').selectedOptions[0].dataset.w);
        const sc = parseFloat(document.getElementById('scale-factor').value);
        const mpp = pw / (measureCanvas.width / currentScale);
        return Math.round((px / currentScale) * mpp * sc);
    }

    function calcArea(rect) {
        const w = Math.abs(rect.p1.x-rect.p2.x), h = Math.abs(rect.p1.y-rect.p2.y);
        const pw = parseFloat(document.getElementById('paper-size').selectedOptions[0].dataset.w);
        const sc = parseFloat(document.getElementById('scale-factor').value);
        const mpp = pw / (measureCanvas.width / currentScale);
        const wmm = (w/currentScale)*mpp*sc, hmm = (h/currentScale)*mpp*sc;
        return ((wmm * hmm) / 1000000).toFixed(3);
    }

    function updateList() {
        const list = document.getElementById('measurement-items');
        list.innerHTML = '';
        measurements.forEach((m,i) => list.innerHTML += `<div>線${i+1}: ${calcDist(m.p1, m.p2)}mm</div>`);
        areaPolygons.forEach((a,i) => list.innerHTML += `<div>面${i+1}: ${calcArea(a)}m²</div>`);
    }

    function resetAll() {
        measurements = []; areaPolygons = []; freehandPaths = []; drawAll(); updateList();
    }

    async function exportToPDF() {
        if (!pdfDoc) return alert("PDFを読み込んでください");
        const name = prompt("ファイル名を入力", "output_drawing");
        if (!name) return;

        const page = await pdfDoc.getPage(pageNum);
        const v = page.getViewport({ scale: 2.0 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = v.width; canvas.height = v.height;

        await page.render({ canvasContext: ctx, viewport: v }).promise;

        const s = 2.0 / currentScale;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        freehandPaths.forEach(path => {
            ctx.beginPath(); ctx.strokeStyle = path.color; ctx.lineWidth = path.width * s;
            ctx.moveTo(path.points[0].x*s, path.points[0].y*s);
            path.points.forEach(p => ctx.lineTo(p.x*s, p.y*s));
            ctx.stroke();
        });

        ctx.font = `bold ${12 * s}px sans-serif`;
        measurements.forEach(m => {
            ctx.strokeStyle = 'red'; ctx.lineWidth = 2 * s;
            ctx.beginPath(); ctx.moveTo(m.p1.x*s, m.p1.y*s); ctx.lineTo(m.p2.x*s, m.p2.y*s); ctx.stroke();
            ctx.fillStyle = 'blue'; ctx.fillText(`${calcDist(m.p1, m.p2)}mm`, ((m.p1.x+m.p2.x)/2)*s, ((m.p1.y+m.p2.y)/2)*s);
        });

        areaPolygons.forEach(a => {
            const x = Math.min(a.p1.x, a.p2.x)*s, y = Math.min(a.p1.y, a.p2.y)*s;
            const w = Math.abs(a.p2.x-a.p1.x)*s, h = Math.abs(a.p2.y-a.p1.y)*s;
            ctx.fillStyle = 'rgba(255,0,0,0.15)'; ctx.fillRect(x,y,w,h);
            ctx.strokeStyle = 'red'; ctx.strokeRect(x,y,w,h);
            ctx.fillStyle = 'blue'; ctx.textAlign = "center";
            ctx.fillText(`${calcArea(a)}m²`, x+w/2, y+h/2);
        });

        const { jsPDF } = window.jspdf;
        const out = new jsPDF(v.width > v.height ? 'l' : 'p', 'px', [v.width, v.height]);
        out.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, v.width, v.height);
        out.save(`${name}.pdf`);
    }
</script>
</body>
</html>

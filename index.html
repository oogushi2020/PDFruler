<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Drawing Measure Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --sidebar-width: 300px;
        }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f3f4f6; }
        
        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e5e7eb;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: bold; color: #4b5563; }
        select, input, button { padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { opacity: 0.9; }

        /* Viewer Styles */
        #viewer-container {
            flex-grow: 1;
            position: relative;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #525659;
        }
        #canvas-wrapper {
            position: relative;
            margin: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        #pdf-canvas { position: absolute; top: 0; left: 0; }
        #measure-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }

        .info-panel {
            margin-top: auto;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 14px;
        }
        .result-value { font-size: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📏 PDF図面計測</h2>
    
    <div class="control-group">
        <label>① PDFを読み込む</label>
        <input type="file" id="file-input" accept="application/pdf">
    </div>

    <div class="control-group">
        <label>② 用紙サイズ</label>
        <select id="paper-size">
            <option value="A4" data-w="297" data-h="210">A4 (297 x 210mm)</option>
            <option value="A3" data-w="420" data-h="297" selected>A3 (420 x 297mm)</option>
            <option value="A2" data-w="594" data-h="420">A2 (594 x 420mm)</option>
            <option value="A1" data-w="841" data-h="594">A1 (841 x 594mm)</option>
        </select>
    </div>

    <div class="control-group">
        <label>③ 図面縮尺 (1 : X)</label>
        <select id="scale-factor">
            <option value="5">1:5</option>
            <option value="10">1:10</option>
            <option value="20">1:20</option>
            <option value="50">1:50</option>
            <option value="100" selected>1:100</option>
            <option value="200">1:200</option>
            <option value="300">1:300</option>
        </select>
    </div>

    <div class="control-group">
        <label>表示倍率</label>
        <input type="range" id="zoom-range" min="0.5" max="3" step="0.1" value="1.5">
        <span id="zoom-val">150%</span>
    </div>

    <div class="info-panel">
        <div>測定結果:</div>
        <div class="result-value" id="measure-result">0 mm</div>
        <div style="font-size: 11px; margin-top: 5px; color: #666;">
            ※端点スナップ有効 (15px以内)<br>
            ※角度スナップ有効（15度単位）<br>
            ※iPad対応
        </div>
    </div>
    
    <button onclick="resetMeasurement()">計測をクリア</button>
</div>

<div id="viewer-container">
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
        <canvas id="measure-canvas"></canvas>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;
    let pageNum = 1;
    let currentScale = 1.5;
    let measurements = []; // 測定履歴
    let isDrawing = false;
    let startPoint = null;
    let currentPoint = null;
    let editingIndex = -1; // 編集中の測定インデックス
    let editingEndPoint = null; // 編集中の終点（'p1' または 'p2'）
    let fixedPoint = null; // 編集中の固定点

    const pdfCanvas = document.getElementById('pdf-canvas');
    const measureCanvas = document.getElementById('measure-canvas');
    const pdfCtx = pdfCanvas.getContext('2d');
    const measureCtx = measureCanvas.getContext('2d');

    // PDF 読み込み
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            pdfDoc = await pdfjsLib.getDocument(typedarray).promise;
            renderPage(pageNum);
        };
        reader.readAsArrayBuffer(file);
    });

    // ズーム変更
    document.getElementById('zoom-range').addEventListener('input', (e) => {
        currentScale = parseFloat(e.target.value);
        document.getElementById('zoom-val').innerText = `${Math.round(currentScale*100)}%`;
        if (pdfDoc) renderPage(pageNum);
    });

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: currentScale });
        
        pdfCanvas.height = viewport.height;
        pdfCanvas.width = viewport.width;
        measureCanvas.height = viewport.height;
        measureCanvas.width = viewport.width;

        const renderContext = { canvasContext: pdfCtx, viewport: viewport };
        await page.render(renderContext).promise;
        
        drawAllMeasurements();
    }

    // 角度スナップ：最も近い15度単位の角度にスナップ
    function snapToAngle(p1, p2) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        
        // 最も近い15度単位にスナップ
        const snapAngles = [0, 15, 30, 45, 60, 75, 90, 105, 120, 135, 150, 165, 180, 195, 210, 225, 240, 255, 270, 285, 300, 315, 330, 345];
        angle = (angle + 360) % 360;
        
        let closestAngle = snapAngles[0];
        let minDiff = 360;
        for (let sa of snapAngles) {
            let diff = Math.abs(angle - sa);
            if (diff > 180) diff = 360 - diff;
            if (diff < minDiff) {
                minDiff = diff;
                closestAngle = sa;
            }
        }
        
        // 7度以内ならスナップ
        if (minDiff < 7) {
            const dist = Math.sqrt(dx*dx + dy*dy);
            const newAngle = closestAngle * Math.PI / 180;
            return {
                x: p1.x + Math.cos(newAngle) * dist,
                y: p1.y + Math.sin(newAngle) * dist
            };
        }
        return p2;
    }

    // クライアント座標を取得（マウス、タッチ対応）
    function getClientCoordinates(e) {
        const rect = measureCanvas.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
            // タッチいべんと（iOS、iPad）
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
            // touchendではtouchesが空なのでchangedTouchesを使用
            clientX = e.changedTouches[0].clientX;
            clientY = e.changedTouches[0].clientY;
        } else {
            // マウスいべんと
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    // 線の端点に近いかどうか判定（閾値10px）
    function isNearEndPoint(x, y, point, threshold = 10) {
        const dist = Math.hypot(x - point.x, y - point.y);
        return dist < threshold;
    }

    // 掴作開始（マウス/タッチ両対応）
    function handlePointerDown(e) {
        // iPad：1指以上の場合は処理を継続
        if (e.touches && e.touches.length > 1) {
            // 2指以上の場合はscrollを許容
            return;
        }
        
        e.preventDefault();
        const coords = getClientCoordinates(e);

        // 既存の測定線の端点をクリックしたか確認
        for (let i = 0; i < measurements.length; i++) {
            // p1（始点）をクリックしたか確認
            if (isNearEndPoint(coords.x, coords.y, measurements[i].p1, 10)) {
                editingIndex = i;
                editingEndPoint = 'p1'; // p1を編集
                fixedPoint = measurements[i].p2; // p2を固定
                startPoint = fixedPoint;
                isDrawing = true;
                return;
            }
            
            // p2（終点）をクリックしたか確認
            if (isNearEndPoint(coords.x, coords.y, measurements[i].p2, 10)) {
                editingIndex = i;
                editingEndPoint = 'p2'; // p2を編集
                fixedPoint = measurements[i].p1; // p1を固定
                startPoint = fixedPoint;
                isDrawing = true;
                return;
            }
        }

        // 新規測定開始
        editingIndex = -1;
        editingEndPoint = null;
        fixedPoint = null;
        startPoint = { x: coords.x, y: coords.y };
        isDrawing = true;
    }

    measureCanvas.addEventListener('mousedown', handlePointerDown);
    measureCanvas.addEventListener('touchstart', handlePointerDown);

    // ポインタ移動（マウス/タッチ両対応）
    function handlePointerMove(e) {
        if (!isDrawing || !startPoint) return;
        
        // iPad：2指以上の場合は処理を継続
        if (e.touches && e.touches.length > 1) {
            return;
        }
        
        e.preventDefault();

        const coords = getClientCoordinates(e);
        let snapPoint = { x: coords.x, y: coords.y };
        
        // 端点スナップ：既存の線の端点に近いかをチェック
        let isSnapped = false;
        const endPointThreshold = 15; // スナップ範囲
        
        for (let i = 0; i < measurements.length; i++) {
            // 編集中の線自体はスキップ
            if (i === editingIndex) continue;
            
            const dist1 = Math.hypot(coords.x - measurements[i].p1.x, coords.y - measurements[i].p1.y);
            const dist2 = Math.hypot(coords.x - measurements[i].p2.x, coords.y - measurements[i].p2.y);
            
            if (dist1 < endPointThreshold) {
                snapPoint = { x: measurements[i].p1.x, y: measurements[i].p1.y };
                isSnapped = true;
                break;
            } else if (dist2 < endPointThreshold) {
                snapPoint = { x: measurements[i].p2.x, y: measurements[i].p2.y };
                isSnapped = true;
                break;
            }
        }
        
        // 端点スナップが有効でない場合、角度スナップを適用
        currentPoint = isSnapped ? snapPoint : snapToAngle(startPoint, snapPoint);
        currentPoint.isSnapped = isSnapped;
        drawAllMeasurements();
    }

    measureCanvas.addEventListener('mousemove', handlePointerMove);
    measureCanvas.addEventListener('touchmove', handlePointerMove);

    // ポインタ拆離（マウス/タッチ両対応）
    function handlePointerUp(e) {
        if (!isDrawing || !startPoint || !currentPoint) {
            isDrawing = false;
            return;
        }
        e.preventDefault();

        if (editingIndex >= 0) {
            // 既存線を更新
            if (editingEndPoint === 'p1') {
                measurements[editingIndex].p1 = currentPoint;
            } else {
                measurements[editingIndex].p2 = currentPoint;
            }
        } else {
            // 新規測定を追加
            measurements.push({
                p1: startPoint,
                p2: currentPoint
            });
        }

        isDrawing = false;
        startPoint = null;
        currentPoint = null;
        editingIndex = -1;
        editingEndPoint = null;
        fixedPoint = null;
        
        drawAllMeasurements();
    }

    measureCanvas.addEventListener('mouseup', handlePointerUp);
    measureCanvas.addEventListener('touchend', handlePointerUp);

    // iPad：2本指スクロール対応（ベースムーブ）
    const viewerContainer = document.getElementById('viewer-container');
    let lastTouchDistance = 0;
    let lastTouchCenterX = 0;
    let lastTouchCenterY = 0;

    measureCanvas.addEventListener('touchmove', (e) => {
        if (e.touches && e.touches.length === 2) {
            // 2指だけの場合を処理
            const touch1 = e.touches[0];
            const touch2 = e.touches[1];
            
            const dx = touch1.clientX - touch2.clientX;
            const dy = touch1.clientY - touch2.clientY;
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            const centerX = (touch1.clientX + touch2.clientX) / 2;
            const centerY = (touch1.clientY + touch2.clientY) / 2;
            
            if (lastTouchDistance > 0) {
                // 測定→編集中でない場合、パン処理
                const deltaX = centerX - lastTouchCenterX;
                const deltaY = centerY - lastTouchCenterY;
                viewerContainer.scrollLeft -= deltaX;
                viewerContainer.scrollTop -= deltaY;
            }
            
            lastTouchDistance = distance;
            lastTouchCenterX = centerX;
            lastTouchCenterY = centerY;
            e.preventDefault();
        } else {
            // 1指の場合はリセット
            lastTouchDistance = 0;
            lastTouchCenterX = 0;
            lastTouchCenterY = 0;
        }
    }, { passive: false });

    measureCanvas.addEventListener('touchstart', (e) => {
        if (e.touches && e.touches.length === 2) {
            lastTouchDistance = 0; // 2指接触時を初期化
        }
    }, { passive: false });

    document.addEventListener('touchend', () => {
        lastTouchDistance = 0;
    });

    // 線の近くかどうか判定
    function isNearLine(x, y, p1, p2, threshold = 10) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        if (len === 0) return Math.hypot(x - p1.x, y - p1.y) < threshold;
        
        const t = Math.max(0, Math.min(1, ((x - p1.x) * dx + (y - p1.y) * dy) / (len * len)));
        const closestX = p1.x + t * dx;
        const closestY = p1.y + t * dy;
        const dist = Math.hypot(x - closestX, y - closestY);
        return dist < threshold;
    }

    // すべての測定線を描画
    function drawAllMeasurements() {
        measureCtx.clearRect(0, 0, measureCanvas.width, measureCanvas.height);

        // 既存の測定を描画
        measurements.forEach((m, idx) => {
            measureCtx.strokeStyle = idx === editingIndex ? '#ff7f00' : 'red';
            measureCtx.lineWidth = 2;
            measureCtx.beginPath();
            measureCtx.moveTo(m.p1.x, m.p1.y);
            measureCtx.lineTo(m.p2.x, m.p2.y);
            measureCtx.stroke();

            // 点
            measureCtx.fillStyle = 'red';
            measureCtx.beginPath();
            measureCtx.arc(m.p1.x, m.p1.y, 4, 0, Math.PI * 2);
            measureCtx.fill();
            measureCtx.beginPath();
            measureCtx.arc(m.p2.x, m.p2.y, 4, 0, Math.PI * 2);
            measureCtx.fill();

            // 寸法表示（中央揃え）
            const midX = (m.p1.x + m.p2.x) / 2;
            const midY = (m.p1.y + m.p2.y) / 2;
            const distMM = calculateDistanceValue(m.p1, m.p2);
            measureCtx.fillStyle = 'blue';
            measureCtx.font = 'bold 14px sans-serif';
            measureCtx.textAlign = 'center';
            measureCtx.textBaseline = 'middle';
            measureCtx.fillText(`${distMM} mm`, midX, midY);
            measureCtx.textAlign = 'left';
            measureCtx.textBaseline = 'alphabetic';
        });

        // ドラッグ中のプレビュー
        if (isDrawing && startPoint && currentPoint) {
            // スナップ対象の端点を表示
            if (!currentPoint.isSnapped) {
                const endPointThreshold = 15;
                for (let i = 0; i < measurements.length; i++) {
                    if (i === editingIndex) continue;
                    
                    const dist1 = Math.hypot(currentPoint.x - measurements[i].p1.x, currentPoint.y - measurements[i].p1.y);
                    const dist2 = Math.hypot(currentPoint.x - measurements[i].p2.x, currentPoint.y - measurements[i].p2.y);
                    
                    // スナップ範囲内の端点をハイライト表示
                    if (dist1 < endPointThreshold) {
                        measureCtx.fillStyle = '#00ff00';
                        measureCtx.beginPath();
                        measureCtx.arc(measurements[i].p1.x, measurements[i].p1.y, 8, 0, Math.PI * 2);
                        measureCtx.fill();
                    }
                    if (dist2 < endPointThreshold) {
                        measureCtx.fillStyle = '#00ff00';
                        measureCtx.beginPath();
                        measureCtx.arc(measurements[i].p2.x, measurements[i].p2.y, 8, 0, Math.PI * 2);
                        measureCtx.fill();
                    }
                }
            }
            
            measureCtx.strokeStyle = currentPoint.isSnapped ? '#00ff00' : '#ffcc00';
            measureCtx.lineWidth = 2;
            measureCtx.setLineDash([5, 5]);
            measureCtx.beginPath();
            measureCtx.moveTo(startPoint.x, startPoint.y);
            measureCtx.lineTo(currentPoint.x, currentPoint.y);
            measureCtx.stroke();
            measureCtx.setLineDash([]);

            // プレビュー点
            measureCtx.fillStyle = currentPoint.isSnapped ? '#00ff00' : 'yellow';
            measureCtx.beginPath();
            measureCtx.arc(startPoint.x, startPoint.y, 4, 0, Math.PI * 2);
            measureCtx.fill();
            measureCtx.beginPath();
            measureCtx.arc(currentPoint.x, currentPoint.y, 6, 0, Math.PI * 2);
            measureCtx.fill();

            // プレビュー距離（中央揃え）
            const prevDistMM = calculateDistanceValue(startPoint, currentPoint);
            const midX = (startPoint.x + currentPoint.x) / 2;
            const midY = (startPoint.y + currentPoint.y) / 2;
            measureCtx.fillStyle = currentPoint.isSnapped ? '#00ff00' : '#ffcc00';
            measureCtx.font = 'bold 14px sans-serif';
            measureCtx.textAlign = 'center';
            measureCtx.textBaseline = 'middle';
            const snapLabel = currentPoint.isSnapped ? ' ★スナップ中' : '';
            measureCtx.fillText(`${prevDistMM} mm${snapLabel}`, midX, midY);
            measureCtx.textAlign = 'left';
            measureCtx.textBaseline = 'alphabetic';
        }
    }

    function calculateDistanceValue(p1, p2) {
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        const pixelDist = Math.sqrt(dx*dx + dy*dy);

        // 用紙設定取得
        const paperSelect = document.getElementById('paper-size');
        const selectedOption = paperSelect.options[paperSelect.selectedIndex];
        const paperWidthMM = parseFloat(selectedOption.getAttribute('data-w'));
        const scaleFactor = parseFloat(document.getElementById('scale-factor').value);

        const mmPerPixel = paperWidthMM / (measureCanvas.width / currentScale);
        const realDistMM = (pixelDist / currentScale) * mmPerPixel * scaleFactor;

        return Math.round(realDistMM);
    }

    function resetMeasurement() {
        measurements = [];
        isDrawing = false;
        startPoint = null;
        currentPoint = null;
        editingIndex = -1;
        measureCtx.clearRect(0, 0, measureCanvas.width, measureCanvas.height);
        document.getElementById('measure-result').innerText = '0 mm';
    }
</script>

</body>
</html>
